extends: "../sdg_config.yaml"

# Experiment 5 — Mixed realistic
# Middle of every axis: moderate height, gentle tilt, standard FOV, warehouse
# distractors, mild noise and blur. Intended to cover the "everyday deployment"
# scenario that sits between the four extremes above.

run:
  num_frames: 25
  distractors: "warehouse"
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp5_mixed_realistic"

camera:
  camera_height_min: 0.8
  camera_height_max: 2.0
  camera_tilt_min: -20.0
  camera_tilt_max: -8.0
  fov_min: 60
  fov_max: 75
  noise_std_min: 2.0
  noise_std_max: 5.0
  motion_blur_strength_min: 1.0
  motion_blur_strength_max: 2.0

lighting:
  intensity_mean: 100000.0
  intensity_std: 600000.0   # full range — matches real mixed conditions

materials:
  roughness_min: 0.3
  roughness_max: 0.8
  metallic_choices: [0]
  emissive_intensity_min: 0.0
  emissive_intensity_max: 300.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_wooden_wall.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_carpet_abstract_pattern.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_brick_reclaimed.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_brick_red_stacked.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_wood_shingles_brown.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg"

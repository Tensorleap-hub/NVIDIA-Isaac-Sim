extends: "../sdg_config.yaml"

# Experiment 1 — Overhead clean
# High camera, always pointing at scene center, no distractors, no degradation.
# Intended as the cleanest baseline: best-case lighting and geometry.

run:
  num_frames: 20
  distractors: "None"
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp1_overhead_clean"

camera:
  camera_height_min: 2.0
  camera_height_max: 4.0
  camera_tilt_min: null    # look_at mode
  camera_tilt_max: null
  fov_min: 60
  fov_max: 90
  color_min: [0.95, 0.95, 0.95]   # near-neutral — minimal tint, clean baseline
  color_max: [1.05, 1.05, 1.05]
  noise_std_min: 0.0
  noise_std_max: 0.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.0

lighting:
  intensity_mean: 150000.0
  intensity_std: 200000.0   # more consistent lighting than base

palletjacks:
  color_min: [0.0, 0.0, 0.0]
  color_max: [1.0, 1.0, 1.0]   # full color range — cleanest baseline
  scale_min: [0.009, 0.009, 0.009]
  scale_max: [0.011, 0.011, 0.011]

# distractor_randomization inherited from base (unused — no distractors)

materials:
  roughness_min: 0.0
  roughness_max: 0.3
  metallic_choices: [0]
  emissive_intensity_min: 0.0
  emissive_intensity_max: 100.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_granite_tile.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_marble.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_tile_hexagonal_green_white.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_tile_square_green.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_tile_hexagonal_various.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_stone_painted_grey.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_wooden_wall.jpg"

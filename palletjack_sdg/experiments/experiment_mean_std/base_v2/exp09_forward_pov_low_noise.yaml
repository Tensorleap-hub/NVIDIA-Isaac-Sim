extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp09_forward_pov_low_noise

environment:
  name: warehouse

distractors:
  clutter_level: 0.9

camera:
  camera_height_mean: 1.3
  camera_height_std: 0.12
  camera_tilt_mean: -2.0
  camera_tilt_std: 2.0
  camera_yaw_mean: 180.0
  camera_yaw_std: 15.0
  fov_mean: 68.0
  fov_std: 3.0
  dataset_noise:
    enabled: true
    mode: gaussian
    sigma_mean: 2.5
    sigma_std: 0.5

lighting:
  intensity_mean: 120000.0
  intensity_std: 100000.0
  visibility_choices: [true]

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg
    - /Isaac/Materials/Textures/Patterns/nv_wooden_wall.jpg


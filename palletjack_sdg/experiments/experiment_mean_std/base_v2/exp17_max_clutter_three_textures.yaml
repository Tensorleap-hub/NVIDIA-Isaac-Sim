extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp17_max_clutter_three_textures

environment:
  name: warehouse_multiple_shelves

distractors:
  clutter_level: 5.0
  groups:
    CardBox:
      diversity: 6
      occurrence: 6
    BarelPlastic:
      diversity: 5
      occurrence: 5
    BottlePlastic:
      diversity: 5
      occurrence: 6
    CratePlastic:
      diversity: 5
      occurrence: 5

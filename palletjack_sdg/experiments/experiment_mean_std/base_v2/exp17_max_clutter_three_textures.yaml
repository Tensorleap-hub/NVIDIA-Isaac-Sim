    - /Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg
    - /Isaac/Materials/Textures/Patterns/nv_brick_reclaimed.jpg
    - /Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg

extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp03_shelves_medium_clutter

environment:
  name: warehouse_multiple_shelves

distractors:
  clutter_level: 1.6
  groups:
    CardBox:
      diversity: 3
      occurrence: 2
    BottlePlastic:
      diversity: 2
      occurrence: 3
    CratePlastic:
      diversity: 2
      occurrence: 2

camera:
  camera_height_mean: 2.8
  camera_height_std: 0.4
  camera_tilt_mean: -22.0
  camera_tilt_std: 5.0
  fov_mean: 74.0
  fov_std: 6.0

palletjacks:
  count_per_model: 2

lighting:
  intensity_mean: 130000.0
  intensity_std: 180000.0
  visibility_choices: [true, true, false]

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_wooden_wall.jpg
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg
    - /Isaac/Materials/Textures/Patterns/nv_tile_square_green.jpg
  roughness_mean: 0.45
  roughness_std: 0.12


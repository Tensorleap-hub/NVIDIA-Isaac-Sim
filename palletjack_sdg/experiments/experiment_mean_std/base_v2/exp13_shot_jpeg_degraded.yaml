extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp13_shot_jpeg_degraded

environment:
  name: warehouse_multiple_shelves

distractors:
  clutter_level: 1.7

camera:
  camera_height_mean: 1.8
  camera_height_std: 0.35
  camera_tilt_mean: -17.0
  camera_tilt_std: 4.5
  fov_mean: 80.0
  fov_std: 6.0
  dataset_noise:
    enabled: true
    mode: shot_jpeg
    shot_scale_mean: 22.0
    shot_scale_std: 3.0
    jpeg_quality_mean: 18
    jpeg_quality_std: 3

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg
    - /Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg


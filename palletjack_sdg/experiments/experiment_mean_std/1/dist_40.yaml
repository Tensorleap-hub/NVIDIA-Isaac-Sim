extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
  distractors: warehouse
environment:
  name: warehouse_with_forklifts
camera:
  camera_type: fisheyePolynomial
  position_mean:
  - -1.0
  - 2.0
  position_std:
  - 3.1845
  - 4.1226
  camera_tilt_mean: -21.0
  camera_tilt_std: 3.1144

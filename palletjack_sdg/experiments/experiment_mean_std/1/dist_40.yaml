      diversity: 3
      occurrence: 3
    PushCart:
      diversity: 1
      occurrence: 1
lighting:
  color_mean:
  - 0.5
  - 0.5
  - 0.5
  color_std:
  - 0.2887
  - 0.2887
  - 0.2887
  intensity_mean: 179675.0
  intensity_std: 432528.0

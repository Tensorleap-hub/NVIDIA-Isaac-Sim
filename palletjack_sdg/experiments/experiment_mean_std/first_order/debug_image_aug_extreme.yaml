extends: shared/baseline.yaml

run:
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/experiment_mean_std/first_order/debug_image_aug_extreme

camera:
  dataset_noise:
    enabled: true
    mode: gaussian_jpeg
    sigma_mean: 22.0
    sigma_std: 0.0
    jpeg_quality_mean: 18
    jpeg_quality_std: 0.0

image_augmentation:
  enabled: true
  brightness_gain_mean: 1.15
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.45
  contrast_gain_std: 0.0
  gamma_mean: 1.35
  gamma_std: 0.0
  color_gain_mean: [1.35, 0.9, 0.72]
  color_gain_std: [0.0, 0.0, 0.0]

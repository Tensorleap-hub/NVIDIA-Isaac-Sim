extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_multiple_shelves
camera:
  camera_type: pinhole
  camera_tilt_mean: -5.0
  camera_tilt_std: 1.1194
  focal_length_std: 0.0
  fov_mean: 76.0
  fov_std: 7.9211
  dataset_noise:
    enabled: true
    mode: gaussian_jpeg
    sigma_mean: 5.0089
    sigma_std: 0.4442
    jpeg_quality_mean: 34.0
    jpeg_quality_std: 5.0
    shot_scale_mean: 18.0
    shot_scale_std: 2.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

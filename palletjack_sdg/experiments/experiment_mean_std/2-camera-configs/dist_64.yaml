extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: full_warehouse
camera:
  camera_type: pinhole
  camera_tilt_mean: -16.0
  camera_tilt_std: 5.7292
  focal_length_std: 0.0
  fov_mean: 70.0
  fov_std: 5.7895
  dataset_noise:
    enabled: true
    mode: gaussian
    sigma_mean: 8.4439
    sigma_std: 0.9483
    jpeg_quality_mean: 25.0
    jpeg_quality_std: 4.0
    shot_scale_mean: 21.0
    shot_scale_std: 3.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

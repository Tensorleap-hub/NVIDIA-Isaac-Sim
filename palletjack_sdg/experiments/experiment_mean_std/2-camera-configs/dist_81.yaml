extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: full_warehouse
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -15.0
  camera_tilt_std: 5.5772
  focal_length_std: 0.0
  fov_mean: 64.0
  fov_std: 9.1404
  dataset_noise:
    enabled: false
    mode: gaussian_jpeg
    sigma_mean: 2.4195
    sigma_std: 0.3273
    jpeg_quality_mean: 31.0
    jpeg_quality_std: 10.0
    shot_scale_mean: 29.0
    shot_scale_std: 3.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -13.0
  camera_tilt_std: 1.7593
  focal_length_std: 0.0
  fov_mean: 90.0
  fov_std: 3.5093
  dataset_noise:
    enabled: true
    mode: shot_jpeg
    sigma_mean: 1.4048
    sigma_std: 0.286
    jpeg_quality_mean: 32.0
    jpeg_quality_std: 9.0
    shot_scale_mean: 91.0
    shot_scale_std: 1.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

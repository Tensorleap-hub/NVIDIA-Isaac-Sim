  camera_tilt_mean: -19.0
  camera_tilt_std: 3.3408
  focal_length_std: 0.0
  fov_mean: 76.0
  fov_std: 6.5106
  dataset_noise:
    enabled: true
    mode: jpeg
    sigma_mean: 4.3139
    sigma_std: 0.5872
    jpeg_quality_mean: 19.0
    jpeg_quality_std: 7.0
    shot_scale_mean: 75.0
    shot_scale_std: 2.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

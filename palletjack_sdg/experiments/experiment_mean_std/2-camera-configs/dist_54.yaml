extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_with_forklifts
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -10.0
  camera_tilt_std: 4.6258
  focal_length_std: 0.0
  fov_mean: 98.0
  fov_std: 7.4338
  dataset_noise:
    enabled: false
    mode: gaussian_jpeg
    sigma_mean: 9.0666
    sigma_std: 0.4576
    jpeg_quality_mean: 18.0
    jpeg_quality_std: 3.0
    shot_scale_mean: 38.0
    shot_scale_std: 1.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

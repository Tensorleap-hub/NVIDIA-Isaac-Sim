extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_multiple_shelves
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -22.0
  camera_tilt_std: 0.9648
  focal_length_std: 0.0
  fov_mean: 104.0
  fov_std: 7.418
  dataset_noise:
    enabled: true
    mode: gaussian_jpeg
    sigma_mean: 1.1241
    sigma_std: 0.7354
    jpeg_quality_mean: 22.0
    jpeg_quality_std: 8.0
    shot_scale_mean: 72.0
    shot_scale_std: 2.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_with_forklifts
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -12.0
  camera_tilt_std: 4.7111
  focal_length_std: 0.0
  fov_mean: 57.0
  fov_std: 7.6377
  dataset_noise:
    enabled: true
    mode: shot_jpeg
    sigma_mean: 8.2108
    sigma_std: 0.8803
    jpeg_quality_mean: 18.0
    jpeg_quality_std: 7.0
    shot_scale_mean: 43.0
    shot_scale_std: 0.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

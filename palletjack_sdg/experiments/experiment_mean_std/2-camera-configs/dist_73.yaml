extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_with_forklifts
camera:
  camera_type: pinhole
  camera_tilt_mean: -5.0
  camera_tilt_std: 5.9983
  focal_length_std: 0.0
  fov_mean: 77.0
  fov_std: 8.9653
  dataset_noise:
    enabled: true
    mode: shot_jpeg
    sigma_mean: 7.4175
    sigma_std: 0.7163
    jpeg_quality_mean: 35.0
    jpeg_quality_std: 9.0
    shot_scale_mean: 36.0
    shot_scale_std: 2.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

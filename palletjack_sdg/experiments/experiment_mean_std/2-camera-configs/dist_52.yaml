extends: ../../../sdg_config_mean_std.yaml
run:
  num_frames: 128
  data_dir: /placeholder
environment:
  name: warehouse_multiple_shelves
camera:
  camera_type: fisheyePolynomial
  camera_tilt_mean: -11.0
  camera_tilt_std: 3.2803
  focal_length_std: 0.0
  fov_mean: 98.0
  fov_std: 3.5219
  dataset_noise:
    enabled: true
    mode: gaussian
    sigma_mean: 3.2562
    sigma_std: 1.6575
    jpeg_quality_mean: 34.0
    jpeg_quality_std: 10.0
    shot_scale_mean: 45.0
    shot_scale_std: 1.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

  camera_tilt_mean: -10.0
  camera_tilt_std: 5.2599
  focal_length_std: 0.0
  fov_mean: 84.0
  fov_std: 9.0365
  dataset_noise:
    enabled: false
    mode: jpeg
    sigma_mean: 5.2497
    sigma_std: 1.8083
    jpeg_quality_mean: 31.0
    jpeg_quality_std: 7.0
    shot_scale_mean: 66.0
    shot_scale_std: 1.0
image_augmentation:
  enabled: false
  brightness_gain_mean: 1.0
  brightness_gain_std: 0.0
  contrast_gain_mean: 1.0
  contrast_gain_std: 0.0
  gamma_mean: 1.0
  gamma_std: 0.0

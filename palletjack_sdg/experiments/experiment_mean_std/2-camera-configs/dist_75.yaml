  camera_tilt_mean: -19.0
  camera_tilt_std: 5.5595
  focal_length_std: 0.0
  fov_mean: 88.0
  fov_std: 4.2062
  dataset_noise:
    enabled: false
    mode: gaussian
    sigma_mean: 1.6659
    sigma_std: 1.2817
    jpeg_quality_mean: 35.0

extends: "../../../sdg_config.yaml"

run:
  num_frames: 25
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/experiment_first_order/baseline_reference"

environment:
  name: "warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_type: "pinhole"
  camera_height_min: 1.4
  camera_height_max: 1.8
  camera_tilt_min: -18.0
  camera_tilt_max: -12.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: 0.0
  camera_roll_max: 0.0
  fov_min: 68
  fov_max: 72
  color_min: [1.0, 1.0, 1.0]
  color_max: [1.0, 1.0, 1.0]
  noise_std_min: 0.0
  noise_std_max: 0.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.0

lighting:
  intensity_mean: 100000.0
  intensity_std: 250000.0

materials:
  roughness_min: 0.4
  roughness_max: 0.6
  emissive_intensity_min: 0.0
  emissive_intensity_max: 100.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"

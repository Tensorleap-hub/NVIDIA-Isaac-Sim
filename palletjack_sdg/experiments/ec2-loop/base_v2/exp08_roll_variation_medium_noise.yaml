extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp08_roll_variation_medium_noise

environment:
  name: warehouse

distractors:
  clutter_level: 1.0

camera:
  camera_height_mean: 1.5
  camera_height_std: 0.25
  camera_tilt_mean: -16.0
  camera_tilt_std: 4.0
  camera_roll_mean: 0.0
  camera_roll_std: 10.0
  fov_mean: 72.0
  fov_std: 5.0
  dataset_noise:
    enabled: true
    mode: gaussian
    sigma_mean: 8.0
    sigma_std: 1.5

palletjacks:
  count_per_model: 2

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_stone_painted_grey.jpg
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg

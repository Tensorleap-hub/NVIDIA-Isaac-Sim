extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp11_gaussian_noise_medium

environment:
  name: warehouse_with_forklifts

distractors:
  clutter_level: 1.3
  groups:
    BarelPlastic:
      diversity: 2
      occurrence: 2
    BottlePlastic:
      diversity: 3
      occurrence: 3

camera:
  camera_height_mean: 1.6
  camera_height_std: 0.25
  camera_tilt_mean: -12.0
  camera_tilt_std: 4.0
  fov_mean: 76.0
  fov_std: 6.0
  dataset_noise:
    enabled: true
    mode: gaussian
    sigma_mean: 12.0
    sigma_std: 2.0

palletjacks:
  count_per_model: 2

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_plastic_blue.jpg
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg

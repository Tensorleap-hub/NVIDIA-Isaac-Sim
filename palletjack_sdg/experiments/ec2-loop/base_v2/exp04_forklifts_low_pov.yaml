extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp04_forklifts_low_pov

environment:
  name: warehouse_with_forklifts

distractors:
  clutter_level: 1.0
  groups:
    PushCart:
      diversity: 1
      occurrence: 2
    CardBox:
      diversity: 2
      occurrence: 1

camera:
  camera_height_mean: 0.7
  camera_height_std: 0.12
  camera_tilt_mean: -7.0
  camera_tilt_std: 2.5
  camera_yaw_mean: 180.0
  camera_yaw_std: 110.0
  fov_mean: 78.0
  fov_std: 5.0
  motion_blur_strength_mean: 0.6
  motion_blur_strength_std: 0.2

palletjacks:
  count_per_model: 2

lighting:
  intensity_mean: 90000.0
  intensity_std: 220000.0
  visibility_choices: [true, false]

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg
  roughness_mean: 0.55
  roughness_std: 0.15
  emissive_intensity_mean: 20.0
  emissive_intensity_std: 8.0

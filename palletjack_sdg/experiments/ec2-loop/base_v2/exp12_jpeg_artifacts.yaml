extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp12_jpeg_artifacts

environment:
  name: warehouse

distractors:
  clutter_level: 1.0

camera:
  camera_height_mean: 1.5
  camera_height_std: 0.2
  camera_tilt_mean: -14.0
  camera_tilt_std: 3.0
  fov_mean: 70.0
  fov_std: 4.0
  dataset_noise:
    enabled: true
    mode: jpeg
    jpeg_quality_mean: 22
    jpeg_quality_std: 4

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_tile_hexagonal_various.jpg
    - /Isaac/Materials/Textures/Patterns/nv_marble.jpg


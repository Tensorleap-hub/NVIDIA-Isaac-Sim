extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 128
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp10_shot_noise_dark

environment:
  name: warehouse

distractors:
  clutter_level: 1.1

camera:
  camera_height_mean: 1.4
  camera_height_std: 0.18
  camera_tilt_mean: -18.0
  camera_tilt_std: 4.0
  fov_mean: 72.0
  fov_std: 5.0
  dataset_noise:
    enabled: true
    mode: shot
    shot_scale_mean: 18.0
    shot_scale_std: 2.0

lighting:
  intensity_mean: 45000.0
  intensity_std: 30000.0
  visibility_choices: [true]

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg
    - /Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg
  emissive_intensity_mean: 0.0
  emissive_intensity_std: 0.0

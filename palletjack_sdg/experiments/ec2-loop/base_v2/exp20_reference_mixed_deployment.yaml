extends: ../../../sdg_config_mean_std.yaml

run:
  num_frames: 256
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/base_v2/exp20_reference_mixed_deployment

environment:
  name: warehouse

distractors:
  clutter_level: 1.2
  groups:
    CardBox:
      diversity: 3
      occurrence: 2
    BarelPlastic:
      diversity: 2
      occurrence: 2
    BottlePlastic:
      diversity: 2
      occurrence: 2
    CratePlastic:
      diversity: 2
      occurrence: 2

camera:
  camera_height_mean: 1.5
  camera_height_std: 0.35
  camera_tilt_mean: -15.0
  camera_tilt_std: 5.0
  camera_yaw_mean: 180.0
  camera_yaw_std: 100.0
  camera_roll_mean: 0.0
  camera_roll_std: 3.0
  fov_mean: 70.0
  fov_std: 7.0
  motion_blur_strength_mean: 0.8
  motion_blur_strength_std: 0.3
  dataset_noise:
    enabled: true
    mode: gaussian_jpeg
    sigma_mean: 6.0
    sigma_std: 1.5
    jpeg_quality_mean: 28
    jpeg_quality_std: 5

palletjacks:
  count_per_model: 2
  position_std: [3.2, 4.8, 0.0]

lighting:
  intensity_mean: 100000.0
  intensity_std: 240000.0
  visibility_choices: [true, true, false]

materials:
  textures:
    - /Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg
    - /Isaac/Materials/Textures/Patterns/nv_brick_reclaimed.jpg
    - /Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg
  roughness_mean: 0.5
  roughness_std: 0.16
  emissive_intensity_mean: 60.0
  emissive_intensity_std: 20.0

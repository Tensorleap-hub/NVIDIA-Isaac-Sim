extends: "../../../sdg_config.yaml"

# Exp 12 — Dark / harsh lighting extremes
# Low mean intensity + very high variance means many near-black frames and
# occasional bright spots. Tests detection under poor visibility conditions.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp12"

environment:
  name: "warehouse"

distractors:
  clutter_level: 0.8

camera:
  camera_height_min: 0.8
  camera_height_max: 2.5
  camera_tilt_min: -30.0
  camera_tilt_max: -8.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -5.0
  camera_roll_max: 5.0
  fov_min: 55
  fov_max: 80
  color_min: [0.60, 0.58, 0.50]   # dark, slightly warm
  color_max: [1.20, 1.15, 1.00]
  noise_std_min: 4.0
  noise_std_max: 10.0              # high sensor noise from low light
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 1.0

lighting:
  intensity_mean: 30000.0          # very dark on average
  intensity_std: 800000.0          # occasional bright spots

materials:
  roughness_min: 0.3
  roughness_max: 1.0
  emissive_intensity_min: 0.0
  emissive_intensity_max: 2000.0   # emissive highlights in dark scene
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_stone_painted_grey.jpg"

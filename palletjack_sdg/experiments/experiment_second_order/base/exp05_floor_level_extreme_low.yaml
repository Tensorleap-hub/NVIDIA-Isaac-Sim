extends: "../../../sdg_config.yaml"

# Exp 05 — Extreme floor-level camera (0.1–0.4 m)
# Simulates a ground-mounted or dragged sensor. Palletjacks appear very large;
# wheels and undercarriage dominate. Wide FOV to keep objects in frame.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp05"

environment:
  name: "warehouse"

distractors:
  clutter_level: 0.8

camera:
  camera_height_min: 0.1
  camera_height_max: 0.4
  camera_tilt_min: -5.0
  camera_tilt_max: 5.0     # nearly horizontal, slight sweep up/down
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -8.0
  camera_roll_max: 8.0
  fov_min: 75
  fov_max: 100
  color_min: [0.80, 0.75, 0.65]
  color_max: [1.15, 1.05, 0.90]
  noise_std_min: 2.0
  noise_std_max: 6.0
  motion_blur_strength_min: 1.5
  motion_blur_strength_max: 4.0

lighting:
  intensity_mean: 80000.0
  intensity_std: 500000.0

materials:
  roughness_min: 0.5
  roughness_max: 1.0
  emissive_intensity_min: 0.0
  emissive_intensity_max: 80.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg"

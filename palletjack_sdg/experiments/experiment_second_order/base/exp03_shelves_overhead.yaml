extends: "../../../sdg_config.yaml"

# Exp 03 — Multiple-shelves warehouse, overhead look-at
# Shelf geometry creates occlusion patterns not present in basic warehouse.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp03"

environment:
  name: "warehouse_multiple_shelves"

distractors:
  clutter_level: 0.5
  groups:
    CardBox:
      diversity: 4
      occurrence: 3
    RackPile:
      diversity: 2
      occurrence: 2

camera:
  camera_height_min: 2.8
  camera_height_max: 4.5
  camera_tilt_min: null    # look_at mode — palletjacks always centered
  camera_tilt_max: null
  fov_min: 55
  fov_max: 80
  color_min: [0.90, 0.90, 0.90]
  color_max: [1.10, 1.10, 1.10]
  noise_std_min: 0.5
  noise_std_max: 2.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.5

lighting:
  intensity_mean: 130000.0
  intensity_std: 250000.0

materials:
  roughness_min: 0.1
  roughness_max: 0.5
  emissive_intensity_min: 0.0
  emissive_intensity_max: 150.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_granite_tile.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"

extends: "../../../sdg_config.yaml"

# Exp 07 — Ultra-wide FOV (90–120°), medium height, full_warehouse
# Wide angle pushes palletjacks to edges and distorts proportions.
# Tests detection of small, distorted objects at the image periphery.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp07"

environment:
  name: "full_warehouse"

distractors:
  clutter_level: 1.5

camera:
  camera_height_min: 1.0
  camera_height_max: 2.5
  camera_tilt_min: null    # look_at — objects always in frame despite wide FOV
  camera_tilt_max: null
  fov_min: 90
  fov_max: 120
  color_min: [0.75, 0.75, 0.75]
  color_max: [1.25, 1.25, 1.25]
  noise_std_min: 2.0
  noise_std_max: 5.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.5

lighting:
  intensity_mean: 90000.0
  intensity_std: 550000.0

materials:
  roughness_min: 0.0
  roughness_max: 1.0
  metallic_choices: [0, 1]
  emissive_intensity_min: 0.0
  emissive_intensity_max: 800.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_stucco_red_painted.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_carpet_abstract_pattern.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_brick_red_stacked.jpg"

extends: "../../../sdg_config.yaml"

# Exp 13 — Heavy sensor degradation (noise + motion blur)
# Simulates a low-quality or fast-moving camera.
# Maximum noise and blur stress-tests robustness to image quality.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp13"

environment:
  name: "warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_height_min: 0.5
  camera_height_max: 2.0
  camera_tilt_min: -20.0
  camera_tilt_max: -5.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -10.0
  camera_roll_max: 10.0
  fov_min: 60
  fov_max: 85
  color_min: [0.80, 0.78, 0.72]
  color_max: [1.20, 1.15, 1.05]
  noise_std_min: 6.0
  noise_std_max: 12.0             # extreme noise
  motion_blur_strength_min: 3.0
  motion_blur_strength_max: 6.0  # extreme motion blur

lighting:
  intensity_mean: 100000.0
  intensity_std: 500000.0

materials:
  roughness_min: 0.2
  roughness_max: 0.9
  emissive_intensity_min: 0.0
  emissive_intensity_max: 300.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"

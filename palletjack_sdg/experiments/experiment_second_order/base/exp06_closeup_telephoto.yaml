extends: "../../../sdg_config.yaml"

# Exp 06 — Close-up telephoto (low height + narrow FOV)
# Low camera + narrow FOV = true close-up: palletjack fills the frame.
# Useful for training on fine details (labels, surface texture, wheels).

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp06"

environment:
  name: "warehouse"

distractors:
  clutter_level: 0.3   # minimal — background mostly blurred by narrow FOV

camera:
  camera_height_min: 0.5
  camera_height_max: 1.5
  camera_tilt_min: -25.0
  camera_tilt_max: -10.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -5.0
  camera_roll_max: 5.0
  fov_min: 30
  fov_max: 50            # narrow FOV = telephoto close-up
  color_min: [0.90, 0.88, 0.85]
  color_max: [1.10, 1.08, 1.05]
  noise_std_min: 0.5
  noise_std_max: 2.5
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 1.0

lighting:
  intensity_mean: 120000.0
  intensity_std: 300000.0

materials:
  roughness_min: 0.2
  roughness_max: 0.7
  emissive_intensity_min: 0.0
  emissive_intensity_max: 200.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_granite_tile.jpg"

extends: "../../../sdg_config.yaml"

# Exp 04 — Warehouse-with-forklifts env, low camera POV
# Pre-placed forklift scene geometry + low-angle camera simulates
# a sensor mounted on equipment navigating a busy aisle.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp04"

environment:
  name: "warehouse_with_forklifts"

distractors:
  clutter_level: 1.2
  groups:
    BarelPlastic:
      diversity: 3
      occurrence: 3
    CardBox:
      diversity: 3
      occurrence: 2

camera:
  camera_height_min: 0.3
  camera_height_max: 1.0
  camera_tilt_min: -15.0
  camera_tilt_max: -3.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -5.0
  camera_roll_max: 5.0
  fov_min: 65
  fov_max: 85
  color_min: [0.85, 0.80, 0.70]
  color_max: [1.10, 1.00, 0.85]
  noise_std_min: 1.0
  noise_std_max: 4.0
  motion_blur_strength_min: 1.0
  motion_blur_strength_max: 3.0

lighting:
  intensity_mean: 90000.0
  intensity_std: 450000.0

materials:
  roughness_min: 0.4
  roughness_max: 1.0
  emissive_intensity_min: 0.0
  emissive_intensity_max: 50.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg"

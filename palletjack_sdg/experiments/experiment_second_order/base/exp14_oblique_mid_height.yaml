extends: "../../../sdg_config.yaml"

# Exp 14 — Oblique mid-height view, constrained yaw sector
# Camera restricted to a ±60° yaw cone (simulating a fixed aisle camera
# with limited pan range). Mid-height oblique view sees palletjack sides.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp14"

environment:
  name: "full_warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_height_min: 1.5
  camera_height_max: 2.8
  camera_tilt_min: -35.0
  camera_tilt_max: -15.0
  camera_yaw_min: -60.0
  camera_yaw_max: 60.0   # constrained pan range — fixed aisle camera
  camera_roll_min: -4.0
  camera_roll_max: 4.0
  fov_min: 50
  fov_max: 70
  color_min: [0.88, 0.85, 0.80]
  color_max: [1.10, 1.05, 0.95]
  noise_std_min: 1.0
  noise_std_max: 3.0
  motion_blur_strength_min: 0.5
  motion_blur_strength_max: 1.5

lighting:
  intensity_mean: 110000.0
  intensity_std: 350000.0

materials:
  roughness_min: 0.2
  roughness_max: 0.7
  emissive_intensity_min: 0.0
  emissive_intensity_max: 250.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_wooden_wall.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_carpet_abstract_pattern.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_stone_painted_grey.jpg"

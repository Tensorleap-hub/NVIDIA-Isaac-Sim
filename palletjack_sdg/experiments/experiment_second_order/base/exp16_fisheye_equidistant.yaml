extends: "../../../sdg_config.yaml"

# Exp 16 — Fisheye equidistant lens (FOV 130–185°)
# Simulates a wide-angle fisheye sensor (e.g. AGV safety camera, door-mounted).
# Strong barrel distortion pushes palletjacks to the periphery and distorts
# their shape — tests the model's distortion robustness.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp16"

environment:
  name: "warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_type: "fisheyeEquidistant"
  camera_height_min: 0.5
  camera_height_max: 2.5
  camera_tilt_min: -20.0
  camera_tilt_max: -5.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -5.0
  camera_roll_max: 5.0
  fov_min: 130
  fov_max: 185              # fisheye range — results in very small focal lengths
  color_min: [0.85, 0.83, 0.78]
  color_max: [1.12, 1.08, 1.00]
  noise_std_min: 1.0
  noise_std_max: 4.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 1.0

lighting:
  intensity_mean: 100000.0
  intensity_std: 450000.0

materials:
  roughness_min: 0.2
  roughness_max: 0.8
  emissive_intensity_min: 0.0
  emissive_intensity_max: 300.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg"

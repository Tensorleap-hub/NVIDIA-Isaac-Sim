extends: "../../../sdg_config.yaml"

# Exp 09 — Near-horizontal forward-facing camera (-8 to +5°)
# Simulates a chest- or bumper-mounted sensor driving toward a palletjack.
# Camera sees mostly sides of palletjacks rather than tops.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp09"

environment:
  name: "warehouse_with_forklifts"

distractors:
  clutter_level: 1.0

camera:
  camera_height_min: 0.6
  camera_height_max: 1.4
  camera_tilt_min: -8.0
  camera_tilt_max: 5.0    # slightly upward to downward — horizontal band
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -6.0
  camera_roll_max: 6.0
  fov_min: 60
  fov_max: 80
  color_min: [0.82, 0.78, 0.70]
  color_max: [1.12, 1.05, 0.90]
  noise_std_min: 1.5
  noise_std_max: 5.0
  motion_blur_strength_min: 1.0
  motion_blur_strength_max: 4.0

lighting:
  intensity_mean: 85000.0
  intensity_std: 500000.0

materials:
  roughness_min: 0.4
  roughness_max: 1.0
  emissive_intensity_min: 0.0
  emissive_intensity_max: 100.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_stone_red_hatch.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_gravel_grey_leaves.jpg"

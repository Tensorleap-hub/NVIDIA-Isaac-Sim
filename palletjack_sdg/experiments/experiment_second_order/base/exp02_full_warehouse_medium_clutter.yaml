extends: "../../../sdg_config.yaml"

# Exp 02 — Full warehouse scene, medium height, moderate clutter
# More scene geometry (full warehouse layout) with realistic object density.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp02"

environment:
  name: "full_warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_height_min: 1.2
  camera_height_max: 2.5
  camera_tilt_min: -20.0
  camera_tilt_max: -8.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -3.0
  camera_roll_max: 3.0
  fov_min: 60
  fov_max: 80
  color_min: [0.88, 0.85, 0.80]
  color_max: [1.10, 1.05, 0.95]
  noise_std_min: 1.0
  noise_std_max: 4.0
  motion_blur_strength_min: 0.5
  motion_blur_strength_max: 1.5

lighting:
  intensity_mean: 100000.0
  intensity_std: 400000.0

materials:
  roughness_min: 0.3
  roughness_max: 0.8
  emissive_intensity_min: 0.0
  emissive_intensity_max: 300.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_rubber_woven_charcoal.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_brick_reclaimed.jpg"

extends: "../../../sdg_config.yaml"

# Exp 01 — Basic warehouse, overhead look-at, no clutter
# Clean baseline with the new environment config.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp01"

environment:
  name: "warehouse"

distractors:
  clutter_level: 0

camera:
  camera_height_min: 2.5
  camera_height_max: 4.5
  camera_tilt_min: null    # look_at mode
  camera_tilt_max: null
  fov_min: 60
  fov_max: 85
  color_min: [0.95, 0.95, 0.95]
  color_max: [1.05, 1.05, 1.05]
  noise_std_min: 0.0
  noise_std_max: 1.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.0

lighting:
  intensity_mean: 150000.0
  intensity_std: 150000.0

materials:
  roughness_min: 0.0
  roughness_max: 0.3
  emissive_intensity_min: 0.0
  emissive_intensity_max: 100.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_granite_tile.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_marble.jpg"

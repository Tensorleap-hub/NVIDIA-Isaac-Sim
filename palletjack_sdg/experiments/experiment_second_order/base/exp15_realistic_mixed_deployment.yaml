extends: "../../../sdg_config.yaml"

# Exp 15 — Realistic mixed deployment
# Covers the "everyday" operating range across all axes:
# mid height, gentle tilt, moderate clutter, realistic lighting and noise.
# Intended as the primary reference distribution for production evaluation.

run:
  num_frames: 256   # larger budget — reference config
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp15"

environment:
  name: "warehouse"

distractors:
  clutter_level: 1.0

camera:
  camera_height_min: 0.8
  camera_height_max: 2.2
  camera_tilt_min: -25.0
  camera_tilt_max: -5.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -5.0
  camera_roll_max: 5.0
  fov_min: 55
  fov_max: 80
  color_min: [0.88, 0.85, 0.80]
  color_max: [1.10, 1.05, 0.95]
  noise_std_min: 1.0
  noise_std_max: 4.0
  motion_blur_strength_min: 0.5
  motion_blur_strength_max: 2.0

lighting:
  intensity_mean: 100000.0
  intensity_std: 600000.0

materials:
  roughness_min: 0.2
  roughness_max: 0.8
  emissive_intensity_min: 0.0
  emissive_intensity_max: 300.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_concrete_aged_with_lines.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_brick_reclaimed.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_asphalt_yellow_weathered.jpg"

extends: "../../../sdg_config.yaml"

# Exp 08 — Ceiling-mounted, steep downward tilt, narrow yaw cone
# Fixed overhead security-camera style: narrow FOV, tight yaw range to
# simulate a camera with a constrained mounting angle.

run:
  num_frames: 128
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/exp08"

environment:
  name: "warehouse_multiple_shelves"

distractors:
  clutter_level: 0.5

camera:
  camera_height_min: 3.5
  camera_height_max: 5.5
  camera_tilt_min: -70.0
  camera_tilt_max: -40.0
  camera_yaw_min: 0.0
  camera_yaw_max: 360.0
  camera_roll_min: -2.0
  camera_roll_max: 2.0
  fov_min: 38
  fov_max: 58
  color_min: [0.85, 0.90, 1.00]   # cool fluorescent overhead tint
  color_max: [1.00, 1.00, 1.15]
  noise_std_min: 0.5
  noise_std_max: 2.0
  motion_blur_strength_min: 0.0
  motion_blur_strength_max: 0.0

lighting:
  intensity_mean: 120000.0
  intensity_std: 250000.0

materials:
  roughness_min: 0.0
  roughness_max: 0.3
  metallic_choices: [0, 1]
  emissive_intensity_min: 0.0
  emissive_intensity_max: 200.0
  textures:
    - "/Isaac/Materials/Textures/Patterns/nv_marble.jpg"
    - "/Isaac/Materials/Textures/Patterns/nv_tile_square_green.jpg"

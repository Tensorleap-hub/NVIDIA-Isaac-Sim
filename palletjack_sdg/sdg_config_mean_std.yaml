# Base SDG configuration for mean/std-driven palletjack dataset generation.
# This mirrors sdg_config.yaml, but sampled parameters are expressed as normal
# distribution mean/std pairs instead of uniform min/max bounds.

run:
  headless: true
  num_frames: 2000
  distractors: warehouse
  data_dir: /isaac-sim/palletjack_sdg/palletjack_data/default

render:
  width: 960
  height: 544

environment:
  name: warehouse

environment_urls:
  warehouse: /Isaac/Environments/Simple_Warehouse/warehouse.usd
  full_warehouse: /Isaac/Environments/Simple_Warehouse/full_warehouse.usd
  warehouse_multiple_shelves: /Isaac/Environments/Simple_Warehouse/warehouse_multiple_shelves.usd
  warehouse_with_forklifts: /Isaac/Environments/Simple_Warehouse/warehouse_with_forklifts.usd

camera:
  camera_type: pinhole
  clipping_range: [0.1, 1000000.0]

  # Horizontal XY position sampled from N(position_mean, position_std).
  position_mean: [-1.0, 2.0]
  position_std: [4.734272, 7.967434]

  # Height above the floor.
  camera_height_mean: 2.2
  camera_height_std: 1.03923

  # Look-at mode remains the default. If camera_tilt_mean is non-null,
  # look_at is ignored and explicit rotation is sampled instead.
  look_at: [0.0, 0.0, 0.0]
  camera_tilt_mean: null
  camera_tilt_std: 0.0
  camera_yaw_mean: 180.0
  camera_yaw_std: 103.923048
  camera_roll_mean: 0.0
  camera_roll_std: 0.0

  # If focal_length_mean is set, it takes precedence over fov_mean/std.
  focal_length_mean: null
  focal_length_std: 0.0
  fov_mean: 75.0
  fov_std: 8.660254

  horizontal_aperture: 20.955
  focus_distance: null
  f_stop: null

  color_mean: null
  color_std: [0.0, 0.0, 0.0]

  # Post-processing values are sampled once per run.
  noise_std_mean: 6.0
  noise_std_std: 2.309401
  motion_blur_strength_mean: 2.5
  motion_blur_strength_std: 0.866025
  jpeg_quality_mean: 97.5
  jpeg_quality_std: 1.443376

palletjacks:
  count_per_model: 2
  assets:
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Scale_A/PalletTruckScale_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Heavy_Duty_A/HeavyDutyPalletTruck_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Low_Profile_A/LowProfilePalletTruck_A01_PR_NVD_01.usd"
  position_mean: [0.0, 3.0, 0.0]
  position_std: [3.464102, 5.196152, 0.0]
  rotation_mean: [0.0, 0.0, 180.0]
  rotation_std: [0.0, 0.0, 103.923048]
  scale_mean: [0.01, 0.01, 0.01]
  scale_std: [0.0, 0.0, 0.0]
  color_mean: [0.5, 0.5, 0.5]
  color_std: [0.288675, 0.288675, 0.288675]

distractor_randomization:
  position_mean: [0.0, 3.0, 0.0]
  position_std: [3.464102, 5.196152, 0.0]
  rotation_mean: [0.0, 0.0, 180.0]
  rotation_std: [0.0, 0.0, 103.923048]
  scale_mean: 1.25
  scale_std: 0.144338


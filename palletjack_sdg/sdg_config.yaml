# Base SDG configuration for palletjack dataset generation.
# CLI args (--headless, --height, --width, --num_frames, --distractors, --data_dir)
# override these values when passed explicitly.

# ── Run settings ──────────────────────────────────────────────────────────────
run:
  headless: true
  num_frames: 2000
  distractors: "warehouse"   # "warehouse" | "additional" | "None"
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/default"

# ── Render resolution ─────────────────────────────────────────────────────────
render:
  width: 960
  height: 544

# ── Environment ───────────────────────────────────────────────────────────────
environment:
  name: "warehouse"   # warehouse | full_warehouse | warehouse_multiple_shelves | warehouse_with_forklifts

environment_urls:
  warehouse:                  "/Isaac/Environments/Simple_Warehouse/warehouse.usd"
  full_warehouse:             "/Isaac/Environments/Simple_Warehouse/full_warehouse.usd"
  warehouse_multiple_shelves: "/Isaac/Environments/Simple_Warehouse/warehouse_multiple_shelves.usd"
  warehouse_with_forklifts:   "/Isaac/Environments/Simple_Warehouse/warehouse_with_forklifts.usd"

# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  # Projection type: pinhole | fisheyeEquidistant | fisheyePolynomial | fisheyeOrthographic
  camera_type: "pinhole"

  clipping_range: [0.1, 1000000.0]

  # Horizontal position (XY plane), sampled uniformly
  position_min: [-9.2, -11.8]
  position_max: [7.2,   15.8]

  # Height (Z) above floor, sampled independently
  camera_height_min: 0.4
  camera_height_max: 4.0

  # Orientation — two modes (mutually exclusive):
  #   look_at mode (default): camera always points at a fixed world point
  look_at: [0.0, 0.0, 0.0]
  #   tilt mode: explicit pitch range (degrees). Positive = nose up, negative = nose down.
  #   When set, look_at is ignored and a random yaw (0-360°) is also applied.
  camera_tilt_min: null    # e.g. -80.0
  camera_tilt_max: null    # e.g. -30.0

  # Focal length (mm), randomised per frame.
  # If set, takes precedence over fov_min/max.
  focal_length_min: null   # e.g. 18.0
  focal_length_max: null  # e.g. 50.0

  # Horizontal field-of-view (degrees), randomised per frame.
  # Used only when focal_length_min/max are null.
  fov_min: 60            # e.g. 60.0
  fov_max: 90            # e.g. 90.0

  # Sensor width used for FOV ↔ focal-length conversion (mm)
  horizontal_aperture: 20.955

  # Fixed optics — null = Isaac Sim default
  focus_distance: null     # cm
  f_stop: null            # e.g. 1.8

  # Per-frame RGB color gain applied to the camera output.
  # Each channel sampled independently from uniform(min[c], max[c]).
  # [1,1,1] = neutral. null = disabled.
  color_min: null   # e.g. [0.8, 0.8, 0.8]
  color_max: null   # e.g. [1.2, 1.2, 1.2]

  # Post-processing — sampled once per run from [min, max]
  noise_std_min: 2.0       # sensor noise std-dev; 0 = disabled
  noise_std_max: 10.0
  motion_blur_strength_min: 1.0   # RTX motion-blur diameter fraction; 0 = disabled
  motion_blur_strength_max: 4.0
  jpeg_quality_min: 95     # JPEG output quality (0–100)
  jpeg_quality_max: 100

# ── Palletjacks ───────────────────────────────────────────────────────────────
palletjacks:
  count_per_model: 2
  assets:
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Scale_A/PalletTruckScale_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Heavy_Duty_A/HeavyDutyPalletTruck_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Low_Profile_A/LowProfilePalletTruck_A01_PR_NVD_01.usd"
  position_min: [-6.0, -6.0, 0.0]
  position_max: [6.0,  12.0, 0.0]
  rotation_min: [0.0, 0.0,   0.0]
  rotation_max: [0.0, 0.0, 360.0]
  scale_min: [0.01, 0.01, 0.01]
  scale_max: [0.01, 0.01, 0.01]
  # Color randomization applied to SteerAxles mesh
  color_min: [0.0, 0.0, 0.0]
  color_max: [1.0, 1.0, 1.0]

# ── Distractor randomization (pose applied to all groups each frame) ──────────
distractor_randomization:
  position_min: [-6.0, -6.0, 0.0]
  position_max: [6.0,  12.0, 0.0]
  rotation_min: [0.0, 0.0,   0.0]
  rotation_max: [0.0, 0.0, 360.0]
  scale_min: 1.0
  scale_max: 1.5

# ── Distractors ───────────────────────────────────────────────────────────────
# clutter_level: global multiplier on every group's occurrence count.
#   0   = no distractors at all
#   1.0 = default counts as specified per group
#   2.0 = double the instances of every group
#
# Per group:
#   assets    : full pool of asset variants for this group
#   diversity : how many different variants to randomly pick each run (≤ len(assets))
#   occurrence: number of instances spawned per picked variant (× clutter_level)
distractors:
  clutter_level: 1.0

  groups:
    CardBox:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxB_01_1262.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxB_01_1268.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxB_01_1482.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxB_01_1683.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxB_01_291.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxD_01_1454.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CardBoxD_01_1513.usd"
      diversity: 3
      occurrence: 2

    BarelPlastic:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_A_01.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_A_02.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_A_03.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_B_01.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_B_03.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BarelPlastic_C_02.usd"
      diversity: 2
      occurrence: 2

    BottlePlastic:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BottlePlasticA_02.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BottlePlasticB_01.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BottlePlasticD_01.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BottlePlasticE_01.usd"
      diversity: 2
      occurrence: 3

    CratePlastic:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CratePlastic_A_04.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CratePlastic_B_03.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CratePlastic_B_05.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CratePlastic_C_02.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_CratePlastic_E_02.usd"
      diversity: 2
      occurrence: 2

    TrafficSigns:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/S_TrafficCone.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/S_WetFloorSign.usd"
      diversity: 2
      occurrence: 2

    Bucket:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_BucketPlastic_B.usd"
      diversity: 1
      occurrence: 2

    RackPile:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_RackPile_03.usd"
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_RackPile_04.usd"
      diversity: 1
      occurrence: 1

    PushCart:
      assets:
        - "/Isaac/Environments/Simple_Warehouse/Props/SM_PushcartA_02.usd"
      diversity: 1
      occurrence: 1

# ── Lighting ──────────────────────────────────────────────────────────────────
lighting:
  color_min: [0.0, 0.0, 0.0]
  color_max: [1.0, 1.0, 1.0]
  intensity_mean: 100000.0
  intensity_std: 600000.0
  # List passed to rep.distribution.choice — duplicate False to lower on-probability
  visibility_choices: [true, false, false, false, false, false, false]


# Base SDG configuration for palletjack dataset generation.
# CLI args (--headless, --height, --width, --num_frames, --distractors, --data_dir)
# override these values when passed explicitly.

# ── Run settings ──────────────────────────────────────────────────────────────
run:
  headless: true
  num_frames: 2000
  distractors: "warehouse"   # "warehouse" | "additional" | "None"
  data_dir: "/isaac-sim/palletjack_sdg/palletjack_data/default"

# ── Render resolution ─────────────────────────────────────────────────────────
render:
  width: 960
  height: 544

# ── Environment ───────────────────────────────────────────────────────────────
environment:
  env_url: "/Isaac/Environments/Simple_Warehouse/warehouse.usd"

# ── Camera ────────────────────────────────────────────────────────────────────
camera:
  # Projection type: pinhole | fisheyeEquidistant | fisheyePolynomial | fisheyeOrthographic
  camera_type: "pinhole"

  clipping_range: [0.1, 1000000.0]

  # Horizontal position (XY plane), sampled uniformly
  position_min: [-9.2, -11.8]
  position_max: [7.2,   15.8]

  # Height (Z) above floor, sampled independently
  camera_height_min: 0.4
  camera_height_max: 4.0

  # Orientation — two modes (mutually exclusive):
  #   look_at mode (default): camera always points at a fixed world point
  look_at: [0.0, 0.0, 0.0]
  #   tilt mode: explicit pitch range (degrees). Positive = nose up, negative = nose down.
  #   When set, look_at is ignored and a random yaw (0-360°) is also applied.
  camera_tilt_min: -80    # e.g. -80.0
  camera_tilt_max: -30    # e.g. -30.0

  # Focal length (mm), randomised per frame.
  # If set, takes precedence over fov_min/max.
  focal_length_min: 18   # e.g. 18.0
  focal_length_max: 50   # e.g. 50.0

  # Horizontal field-of-view (degrees), randomised per frame.
  # Used only when focal_length_min/max are null.
  fov_min: 60            # e.g. 60.0
  fov_max: 90            # e.g. 90.0

  # Sensor width used for FOV ↔ focal-length conversion (mm)
  horizontal_aperture: 20.955

  # Fixed optics — null = Isaac Sim default
  focus_distance: 200     # cm
  f_stop: 1.8             # e.g. 1.8

  # Post-processing — sampled once per run from [min, max]
  noise_std_min: 2.0       # sensor noise std-dev; 0 = disabled
  noise_std_max: 10.0
  motion_blur_strength_min: 1.0   # RTX motion-blur diameter fraction; 0 = disabled
  motion_blur_strength_max: 4.0
  jpeg_quality_min: 95     # JPEG output quality (0–100)
  jpeg_quality_max: 100

# ── Palletjacks ───────────────────────────────────────────────────────────────
palletjacks:
  count_per_model: 2
  assets:
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Scale_A/PalletTruckScale_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Heavy_Duty_A/HeavyDutyPalletTruck_A01_PR_NVD_01.usd"
    - "http://omniverse-content-production.s3-us-west-2.amazonaws.com/Assets/DigitalTwin/Assets/Warehouse/Equipment/Pallet_Trucks/Low_Profile_A/LowProfilePalletTruck_A01_PR_NVD_01.usd"
  position_min: [-6.0, -6.0, 0.0]
  position_max: [6.0,  12.0, 0.0]
  rotation_min: [0.0, 0.0,   0.0]
  rotation_max: [0.0, 0.0, 360.0]
  scale_min: [0.01, 0.01, 0.01]
  scale_max: [0.01, 0.01, 0.01]
  # Color randomization applied to SteerAxles mesh
  color_min: [0.0, 0.0, 0.0]
  color_max: [1.0, 1.0, 1.0]

# ── Distractor randomization (shared for both pools) ─────────────────────────
distractor_randomization:
  position_min: [-6.0, -6.0, 0.0]
  position_max: [6.0,  12.0, 0.0]
  rotation_min: [0.0, 0.0,   0.0]
  rotation_max: [0.0, 0.0, 360.0]
  scale_min: 1.0
  scale_max: 1.5


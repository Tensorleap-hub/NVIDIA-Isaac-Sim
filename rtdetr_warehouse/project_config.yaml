image_size: 640

data:
  data_path: "/Users/orram/Tensorleap/data/warehouse"
  annotations_file: "dataset/labels/loco-all-v1.json"

model_path: "rtdetrv2_r18vd_120e_raw_outputs.onnx"
model_type: "RTDETR"

output_indices:
  labels: 0
  boxes: 1
  scores: 2
  pred_logits: 3
  pred_boxes: 4

max_num_of_objects: 400

split:
  train_subsets:
    - "subset-2"
    - "subset-3"
    - "subset-5"
  val_subsets:
    - "subset-1"
    - "subset-4"

categories:
  - {coco_id: 3,  name: small_load_carrier, idx: 0}
  - {coco_id: 5,  name: forklift,           idx: 1}
  - {coco_id: 7,  name: pallet,             idx: 2}
  - {coco_id: 10, name: stillage,           idx: 3}
  - {coco_id: 11, name: pallet_truck,       idx: 4}

loss:
  map_coco_category_to_label: false
  weight_dict:
    loss_vfl: 1.0
    loss_bbox: 5.0
    loss_giou: 2.0
  alpha: 0.75
  gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2.0

max_samples:   # null = no limit; set to e.g. 100 to cap each subset

score_threshold: 0.3
max_detections: 300
plot_visualizers: true
check_subset_index: 0
check_sample_index: 0

synth_data:
  base_path: "/Users/orram/Tensorleap/data/warehouse"

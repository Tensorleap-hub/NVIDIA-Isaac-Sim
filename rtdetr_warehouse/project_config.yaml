image_size: 640

data:
  data_path: "/Users/orram/Tensorleap/data/warehouse"
  annotations_file: "dataset/labels/loco-all-v1.json"

model_path: "yolo11s.onnx"
model_type: "YOLO11"

output_indices:
  labels: 0
  boxes: 1
  scores: 2
  pred_logits: 3
  pred_boxes: 4

max_num_of_objects: 400

split:
  train_subsets:
    - "subset-2"
    - "subset-3"
    - "subset-5"
  val_subsets:
    - "subset-1"
    - "subset-4"

categories:
  - {coco_id: 3,  name: small_load_carrier, idx: 0}
  - {coco_id: 5,  name: forklift,           idx: 1}
  - {coco_id: 7,  name: pallet,             idx: 2}
  - {coco_id: 10, name: stillage,           idx: 3}
  - {coco_id: 11, name: pallet_truck,       idx: 4}

loss:
  map_coco_category_to_label: false
  weight_dict:
    loss_vfl: 1.0
    loss_bbox: 5.0
    loss_giou: 2.0
  alpha: 0.75
  gamma: 2.0
  matcher:
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    alpha: 0.25
    gamma: 2.0

max_samples:   # null = no limit; set to e.g. 100 to cap each subset

score_threshold: 0.3
max_detections: 300
plot_visualizers: true
check_subset_index: 0
check_sample_index: 0

synth_data:
  base_path: "/Users/orram/Tensorleap/data/warehouse"
  additional: true # set to false to exclude synthetic data entirely
  run_numbers: [0,1,2] # null = include all runs; list of ints to include specific runs e.g. [1, 3, 5]
  num_samples:            # null = no limit; set to e.g. 500 to cap additional dataset size
                                 #   (data is shuffled before capping and sampling keeps experiments run relative sizes)

extended_data:
  base_path: "/Users/orram/Tensorleap/data/warehouse/extended"
  additional: true          # set to false to exclude extended data entirely
  extended_numbers:      # null = include all; list of ints to include specific run folders e.g. [0, 1]
  num_samples:              # null = no limit; per-run cap (same semantics as synth_data.num_samples)

optuna_data:
  base_path: "/Users/orram/Tensorleap/data/warehouse/optuna-ec2"
  additional: true          # set to false to exclude optuna-generated data entirely
  num_samples:              # null = no limit; per-experiment cap after deterministic shuffle
